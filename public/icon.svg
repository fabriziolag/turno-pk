<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo a sangre completa (seguro para íconos "maskable") -->
  <rect width="512" height="512" fill="#0f2a1d"/>
  <radialGradient id="bg" cx="32%" cy="28%" r="85%">
    <stop offset="0%" stop-color="#1d4a32"/>
    <stop offset="100%" stop-color="#0f2a1d"/>
  </radialGradient>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Placa dorada centrada dentro de la zona segura -->
  <rect x="136" y="136" width="240" height="240" rx="48" fill="url(#g)"/>
  <text x="256" y="332" font-family="Georgia, 'Times New Roman', serif" font-size="150"
        font-weight="700" text-anchor="middle" fill="#1a1206">PK</text>
  <defs>
    <radialGradient id="g" cx="30%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#d8bd5f"/>
      <stop offset="55%" stop-color="#c9a84a"/>
      <stop offset="100%" stop-color="#a8862f"/>
    </radialGradient>
  </defs>
</svg>
